name: Send Email Alert # nombre del action

on: # disparador
  pull_request: # Cuando se abre/actualiza un Pull Request(PR)
    types: [opened, reopened, synchronize]
    branches: [ main ] # solo cuando el pr apunte a main

jobs:
  test: # Job principal
    name: Django pytest
    runs-on: ubuntu-latest
    timeout-minutes: 3
    env:
      PYTHONPATH: ${{ github.workspace }}/itec2025
      PYTHONDONTWRITEBYTECODE: 1
      PYTHONUNBUFFERED: 1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests (Pytest)
        run: python -m pytest -q

  notify: # Job 2, ahora dentro de jobs
    name: Send email on success
    needs: test # solo se ejecuta si test terminó
    if: success()
    runs-on: ubuntu-latest

    steps:
      - name: Send email
        uses: dawidd6/action-send-mail@v3
        with: 
          server_address: ${{ secrets.EMAIL_HOST }}
          server_port: ${{ secrets.EMAIL_PORT }}
          username: ${{ secrets.EMAIL_HOST_USER }}
          password: ${{ secrets.EMAIL_HOST_PASSWORD }}
          subject: "PR LISTO PARA MERGE"
          to: ${{ secrets.EMAIL_TO }}
          from: ${{ secrets.EMAIL_FROM }}
          secure: STARTTLS
          body: |
            El pull request paso sin problema
            Autor del PR: ${{ github.event.pull_request.user.login }}
