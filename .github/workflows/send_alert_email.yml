name: Send Email Alert

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches: [ main ]

jobs:
  test:
    name: Django pytest
    runs-on: ubuntu-latest
    timeout-minutes: 3
    env:
      PYTHONPATH: ${{ github.workspace }}/itec2025
      PYTHONDONTWRITEBYTECODE: 1
      PYTHONUNBUFFERED: 1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest -q

  notify:
    name: Send email on success
    needs: test
    if: success()
    runs-on: ubuntu-latest

    steps:
      - name: Send email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.EMAIL_HOST }}
          server_port: ${{ secrets.EMAIL_PORT }}
          username: ${{ secrets.EMAIL_HOST_USER }}
          password: ${{ secrets.EMAIL_HOST_PASSWORD }}
          subject: "PR LISTO PARA MERGE"
          to: ${{ secrets.EMAIL_TO }}
          from: ${{ secrets.EMAIL_FROM }}
          secure: STARTTLS
          body: |
            El pull request pasó sin problema
            Autor del PR: ${{ github.event.pull_request.user.login }}
